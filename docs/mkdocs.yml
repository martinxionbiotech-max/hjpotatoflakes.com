site_name: Hongji Agriculture — Technical Documentation Knowledge Center
site_url: https://docs.hjpotatoflakes.com
site_description: >-
  Technical documentation knowledge base for Hongji Agriculture's vertically
  integrated potato flake and powder products — covering variety breeding,
  farming, storage, processing, quality control, product application, and
  industry compliance.

theme:
  name: material
  language: en
  custom_dir: overrides/
  features:
    - navigation.tabs            # 开启顶部一级选项卡，分流侧边栏压力
    - navigation.tabs.sticky     # 页面向下滚动时顶部导航栏吸顶
    - navigation.sections        # 侧边栏子菜单按区域逻辑分组
    - navigation.expand          # 默认展开当前侧边栏菜单
    - navigation.top             # 悬浮回到顶部按钮
    - navigation.indexes         # 允许点击目录节点直接打开索引页
    - navigation.pruning         # 仅渲染当前路径菜单，提升页面加载性能
    - search.suggest             # 搜索框提供实时下拉输入建议
    - search.highlight           # 搜索结果关键词高亮
    - search.share               # 支持分享带搜索结果的链接
    - content.code.copy          # 代码块一键复制按钮
    - toc.follow                 # 右侧文章目录自动跟随滚动高亮
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode

extra:
  generator: false
  social: []

markdown_extensions:
  - attr_list                    # 支持 HTML/CSS 属性挂载（如卡片布局）
  - md_in_html                   # 支持在 HTML 标签中解析 Markdown
  - admonition                   # 提示框扩展
  - pymdownx.details             # 折叠块扩展
  - pymdownx.superfences         # 高级代码块嵌套扩展
  - pymdownx.tabbed:             # 标签页切换扩展
      alternate_style: true
  - pymdownx.highlight:          # 代码高亮扩展
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables                       # 表格支持
  - toc:
      permalink: true            # 标题生成锚点链接

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)'
  - glightbox
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
        remove_empty_space: true

# 重新归类与精简后的导航菜单（按业务流程分组，去除了冗长的名称）
nav:
  - Home: index.md

  - Raw Material & Agronomy:
    - Overview: domain-01-variety-breeding/index.md
    - Variety & Breeding: domain-01-variety-breeding/index.md
    - Farming & Cultivation: domain-02-farming-cultivation/index.md
    - Storage & Raw Material: domain-03-storage-raw-material/index.md

  - Processing & Quality:
    - Overview: domain-04-processing-technology/index.md
    - Processing Technology: domain-04-processing-technology/index.md
    - Quality Control: domain-05-quality-control/index.md

  - Products & Applications:
    - Overview: domain-06-product-application/index.md
    - Product Application: domain-06-product-application/index.md
    - Application Records: domain-08-application-records/index.md

  - Knowledge & Resources:
    - Industry Knowledge: domain-07-industry-knowledge/index.md
    - Document Index: INDEX.md

