site_name: Hongji Agriculture — Technical Documentation Knowledge Center
site_url: https://docs.hjpotatoflakes.com
site_description: >-
  Technical documentation knowledge base for Hongji Agriculture's vertically
  integrated potato flake and powder products.

theme:
  name: material
  language: en
  custom_dir: overrides/
  features:
    - navigation.sections        # 按区域分组，保持侧边栏清晰
    - navigation.expand          # 默认展开侧边栏，方便直接查找
    - navigation.top             # 回到顶部按钮
    - navigation.indexes         # 支持点击目录节点直接打开索引
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode

extra:
  generator: false
  social: []

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)'
  - glightbox
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
        remove_empty_space: true

