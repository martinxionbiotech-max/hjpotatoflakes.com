site_name: Hongji Agriculture — Technical Documentation Knowledge Center
site_url: https://hjpotatoflakes.com
site_description: >-
  Technical documentation knowledge base for Hongji Agriculture's vertically
  integrated potato flake and powder products — covering variety breeding,
  farming, storage, processing, quality control, product application, and
  industry compliance.

repo_url: https://github.com/hongji-agriculture/hj-potato-docs
repo_name: hongji-agriculture/hj-potato-docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  custom_dir: overrides/
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - glightbox
  - minify:
      minify_html: true

extra_css:
  - assets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true

extra:
  generator: false

copyright: >
  &copy; 2026 Hongji Agriculture Technology Co., Ltd. (弘基农业) —
  <a href="https://hjpotatoflakes.com">hjpotatoflakes.com</a>

